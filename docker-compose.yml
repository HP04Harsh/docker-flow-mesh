version: v1.0
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docker-flow-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - WORKER_URL=http://worker:5000
      - NODE_ENV=production
    networks:
      - app-network
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: docker-flow-worker
    restart: unless-stopped
    environment:
      - PORT=5000
      - WORKER_ID=worker-1
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: docker-flow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

networks:
  app-network:
    driver: bridge
